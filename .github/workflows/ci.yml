name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure (tests only)
        run: cmake -S . -B build -DBUILD_SERVER=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Validate golden data reproducibility
        run: |
          ./build/nms_golden_test --dump nms_case1 | diff -u tests/golden/nms_case1.json -
          ./build/nms_golden_test --dump nms_case2 | diff -u tests/golden/nms_case2.json -
